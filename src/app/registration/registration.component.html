
<div class="A">
    <form [formGroup]="registration" >
        <div class="b">
            <div class="c">
        <label for="name" >First Name:</label>
        <input type="text" id="name" placeholder="Enter FirstName" formControlName="first">
        </div>
        <div class="d">
        <label for="last">Last Name:</label>
        <input type="text" id="last" placeholder="Enter LastName" formControlName="last">
            </div>
        </div>
        <label for="mail">Mail:</label>
        <input type="email" id="mail" placeholder="Enter Mail" formControlName="email">
        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="Enter Password" formControlName="pass">
        <label for="ph">PhoneNo:</label>
        <input type="number" id="ph" placeholder="Enter PhoneNo" formControlName="phno">
        <button (click)="submit()">Submit</button>

    </form> 
 </div>
