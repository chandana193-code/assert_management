<div class="login-page">

  <!-- LEFT SIDE -->
  <div class="login-hero">
    <div class="hero-content">
      <span class="badge">TVK Assets</span>
      <h1>TVK Asset Tracker</h1>
      <p>Secure admin and employee workflows for managing assets.</p>
    </div>
  </div>

  <!-- RIGHT SIDE (YOUR FORM) -->
  <div class="login-container">
    <h2>Welcome Back</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email">
        <div class="field-errors" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Email is required
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter your password">
        <div class="field-errors" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required
        </div>
      </div>

      <button type="submit" [disabled]="!loginForm.valid">Login</button>
    </form>

    <div class="signup">
      Don't have an account?
      <a [routerLink]="['/register']">Register here</a>
    </div>
  </div>

  <div class="popup-overlay" *ngIf="showSuccess">
    <div class="popup-box">
      <div class="success-icon">
        <div class="circle"></div>
        <div class="tick"></div>
      </div>
      <h3>Login Successful</h3>
    </div>
  </div>
  <div class="popup-overlay" *ngIf="showError">
    <div class="popup-box error">
      <div class="error-icon">
        <div class="circle"></div>
        <div class="cross"></div>
      </div>
      <h3>Invalid Email or Password</h3>
    </div>
  </div>
</div>
